<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Nunes</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
<style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,215,0,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,180,90,0.12), transparent 30%),
        linear-gradient(135deg,#041b2d,#06243d,#02111f);
      min-height:100vh;
      color:#fff;
      overflow-x:hidden;
    }

    /* Fundo decorativo */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
    }

    .navbar{
      width:100%;
      padding:22px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      backdrop-filter:blur(14px);
      background:rgba(255,255,255,0.04);
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:sticky;
      top:0;
      z-index:1000;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo-ball{
      width:52px;
      height:52px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fff 0%, #f1f1f1 40%, #d9d9d9 100%);
      position:relative;
      box-shadow:
        0 0 25px rgba(255,215,0,0.4),
        0 0 60px rgba(0,255,140,0.15);
    }

    .logo-ball::before,
    .logo-ball::after{
      content:"";
      position:absolute;
      border:2px solid rgba(0,0,0,0.15);
      border-radius:50%;
    }

    .logo-ball::before{
      inset:10px;
    }

    .logo-ball::after{
      inset:18px;
    }

    .logo h1{
      font-size:1.4rem;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
      background:linear-gradient(90deg,#ffd700,#ffffff,#00d26a);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .menu{
      display:flex;
      gap:14px;
      list-style:none;
    }

    .menu li a{
      position:relative;
      text-decoration:none;
      color:#fff;
      font-size:0.98rem;
      font-weight:500;
      padding:12px 20px;
      border-radius:14px;
      transition:all 0.35s ease;
      overflow:hidden;
    }

    .menu li a::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(
        135deg,
        rgba(255,215,0,0.18),
        rgba(0,210,106,0.18)
      );
      opacity:0;
      transition:0.35s;
      border-radius:14px;
    }

    .menu li a:hover::before{
      opacity:1;
    }

    .menu li a:hover{
      transform:translateY(-2px);
      color:#ffd700;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.35),
        0 0 25px rgba(255,215,0,0.12);
    }

    .hero{
      height:calc(100vh - 96px);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px;
      position:relative;
    }

    .hero-content{
      max-width:900px;
    }

    .hero h2{
      font-size:4rem;
      line-height:1.1;
      margin-bottom:24px;
      font-weight:700;
      background:linear-gradient(90deg,#ffffff,#ffd700,#00ff95);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:shine 5s linear infinite;
      background-size:300%;
    }

    @keyframes shine{
      0%{
        background-position:0%;
      }
      100%{
        background-position:300%;
      }
    }

    .hero p{
      color:rgba(255,255,255,0.8);
      font-size:1.1rem;
      line-height:1.8;
      margin-bottom:35px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:16px 34px;
      border-radius:18px;
      text-decoration:none;
      color:#02111f;
      font-weight:700;
      background:linear-gradient(135deg,#ffd700,#00d26a);
      transition:0.35s;
      box-shadow:
        0 15px 40px rgba(0,0,0,0.4),
        0 0 25px rgba(255,215,0,0.25);
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.02);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.5),
        0 0 35px rgba(0,255,128,0.35);
    }

    /* Responsivo */
    @media(max-width:900px){

      .navbar{
        padding:20px 25px;
        flex-direction:column;
        gap:20px;
      }

      .menu{
        flex-wrap:wrap;
        justify-content:center;
      }

      .hero h2{
        font-size:2.7rem;
      }

      .hero p{
        font-size:1rem;
      }
    }

    @media(max-width:600px){

      .menu li a{
        padding:10px 14px;
        font-size:0.9rem;
      }

      .hero h2{
        font-size:2rem;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">

    <div class="logo">
      <div class="logo-ball"></div>
      <h1>World Cup Elite</h1>
    </div>

    <ul class="menu">
      <li><a href="#">Início</a></li>
      <li><a href="#">Seleções</a></li>
      <li><a href="#">Jogos</a></li>
      <li><a href="#">Estádios</a></li>
      <li><a href="#">Ranking</a></li>
      <li><a href="#">Contato</a></li>
    </ul>

  </header>

        </header>

        <section>

        </section>

        <footer>
            <p>Gabriel Nunes</p>
        </footer>

    </div>
</body>
</html>
